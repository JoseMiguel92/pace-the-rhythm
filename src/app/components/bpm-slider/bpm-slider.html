<div
  class="flex flex-col items-center gap-2 w-full rounded-2xl border border-gray-200 bg-white px-5 py-4 shadow-lg dark:border-white/10 dark:bg-neutral-900 dark:shadow-xl"
>
  <div class="flex flex-col items-center">
    <span class="metric-value text-gray-900 dark:text-white">
      {{ currentBpm() | number:'1.0-0' }}
    </span>
    <span class="field-label text-gray-400 dark:text-neutral-600 mt-1">BPM</span>
  </div>

  <div
    class="text-sm font-semibold px-3 py-1 rounded-full transition-all duration-300"
    [ngClass]="bpmZone().cssClass"
  >
    {{ bpmZone().label }}
  </div>

  <div class="relative w-full px-4! mr-4!">
    <mat-slider
      class="w-full!"
      [disabled]="disabled"
      [max]="bpmMax"
      [min]="bpmMin"
      [step]="step"
      [discrete]="thumbLabel"
      [showTickMarks]="showTicks"
    >
      <input matSliderThumb [ngModel]="currentBpm()" (ngModelChange)="bpmChange.emit($event)" />
    </mat-slider>

    <div class="relative w-full h-6">
      @for (mark of presetMarks; track mark.value) {
        <div
          class="absolute flex flex-col items-center -translate-x-1/2"
          [style.left.%]="toPercent(mark.value)"
        >
          <div class="w-px h-2 bg-gray-300 dark:bg-neutral-600"></div>
          <span class="text-[10px] text-gray-400 dark:text-neutral-500 mt-0.5">{{
            mark.label
          }}</span>
        </div>
      }
    </div>
  </div>
</div>

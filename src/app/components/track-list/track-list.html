<mat-list role="list">
  @for (track of tracks(); track track.id) {
    <mat-list-item role="listitem">
      <div
        class="flex w-full items-center gap-x-4 rounded-2xl border border-gray-200 bg-white p-5 shadow-sm mb-3 dark:border-white/10 dark:bg-neutral-900 dark:shadow-none"
      >
        <div class="flex w-full items-start justify-between">
          <div>
            <div class="text-xl font-medium text-gray-900 dark:text-white">
              {{ track.trackTitle }}
            </div>
            <p class="text-gray-500 dark:text-neutral-400">{{ track.artists | artistList }}</p>
          </div>
          <span class="text-gray-400 dark:text-neutral-500 text-sm shrink-0 ml-4">
            {{ track.durationMs | msDuration }}
          </span>
        </div>
      </div>
    </mat-list-item>
  } @empty {
    <div
      class="flex w-full items-center gap-x-4 rounded-2xl border border-gray-200 bg-white p-5 shadow-sm dark:border-white/10 dark:bg-neutral-900 dark:shadow-none"
    >
      <p class="text-gray-500 dark:text-neutral-400">No values</p>
    </div>
  }
</mat-list>

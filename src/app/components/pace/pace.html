<div class="flex flex-col items-center gap-2 w-full">
  <div
    class="inline-flex items-end gap-1 rounded-2xl border border-gray-200 bg-white px-5 py-4 shadow-lg transition-all duration-300 ease-out focus-within:border-emerald-500/40 focus-within:ring-4 focus-within:ring-emerald-500/10 dark:border-white/10 dark:bg-neutral-900 dark:shadow-xl"
  >
    <div class="flex flex-col items-center gap-1.5">
      <input
        type="number"
        [ngModel]="minutes()"
        (ngModelChange)="minutes.set($event)"
        (focus)="onFocus()"
        (blur)="onBlur()"
        min="0"
        placeholder="00"
        class="no-spinners metric-value w-16 bg-transparent text-center font-mono text-gray-900 outline-none caret-emerald-500 placeholder:text-gray-300 transition-colors duration-150 focus:text-emerald-600 dark:text-white dark:caret-emerald-400 dark:placeholder:text-neutral-700 dark:focus:text-emerald-300"
      />
      <span class="field-label text-gray-400 dark:text-neutral-600">min</span>
    </div>

    <span
      class="mb-7 select-none font-mono text-4xl font-bold leading-none text-gray-300 dark:text-neutral-600"
    >
      :
    </span>

    <div class="flex flex-col items-center gap-1.5">
      <input
        type="number"
        [ngModel]="seconds()"
        (ngModelChange)="seconds.set($event)"
        (focus)="onFocus()"
        (blur)="onBlur()"
        min="0"
        max="59"
        placeholder="00"
        class="no-spinners metric-value w-16 bg-transparent text-center font-mono text-gray-900 outline-none caret-emerald-500 placeholder:text-gray-300 transition-colors duration-150 focus:text-emerald-600 dark:text-white dark:caret-emerald-400 dark:placeholder:text-neutral-700 dark:focus:text-emerald-300"
      />
      <span class="field-label text-gray-400 dark:text-neutral-600">seg</span>
    </div>
  </div>
</div>
